services:
  backend:
    image: php:8.3-cli
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: php -S 0.0.0.0:8080 -t public
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-fallback}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-incident_copilot}
      MYSQL_USER: ${MYSQL_USER:-incident}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-incident}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data:
